{% extends "base.html" %}
{% block title %}Code Generation — AI Assistant{% endblock %}
{% block content %}
<div class="page-title">Code Generation</div>

<div class="glass-card">
  <div class="toolbar">
    <select id="lang-select">
      {% for l in languages %}<option value="{{ l }}">{{ l|capfirst }}</option>{% endfor %}
    </select>
    <select id="model-select">
      {% for m in models %}<option value="{{ m }}">{{ m }}</option>{% endfor %}
    </select>
    <button class="btn btn-primary" id="gen-btn">⚡ Generate</button>
    <button class="btn btn-ghost btn-sm hidden" id="stop-btn">■ Stop</button>
  </div>

  <div class="form-group">
    <label for="desc-input">Describe what you want to build</label>
    <textarea id="desc-input" placeholder="e.g. A function that reads a CSV file and returns a list of dicts"
              rows="4" data-autoresize></textarea>
  </div>

  <div class="form-group">
    <label>Context code <span class="text-muted text-sm">(optional — paste or upload existing code for reference)</span></label>
    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept=".py,.js,.ts,.go,.rs,.java,.c,.cpp,.sh,.sql">
      Drop a file here or click to browse
      <span id="file-label" class="text-sm text-muted mt-1"></span>
    </div>
  </div>

  <div class="form-group">
    <textarea id="context-input" placeholder="…or paste context code directly here" rows="6"
              style="font-family: 'SF Mono','Fira Code',monospace;font-size:13px"></textarea>
  </div>

  <div class="stream-output prose" id="output"
       data-placeholder="Generated code will appear here…"></div>
</div>

<script>
const descInput    = document.getElementById("desc-input");
const contextInput = document.getElementById("context-input");
const fileInput    = document.getElementById("file-input");
const fileLabel    = document.getElementById("file-label");
const dropZone     = document.getElementById("drop-zone");
const genBtn       = document.getElementById("gen-btn");
const stopBtn      = document.getElementById("stop-btn");
const outputEl     = document.getElementById("output");
const langSel      = document.getElementById("lang-select");
const modelSel     = document.getElementById("model-select");

initDropZone(dropZone, fileInput, fileLabel);
autoResize(descInput);

fileInput.addEventListener("change", () => {
  const file = fileInput.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => { contextInput.value = e.target.result; };
  reader.readAsText(file);
});

let abortCtrl = null;

genBtn.addEventListener("click", async () => {
  const description = descInput.value.trim();
  if (!description) return;

  genBtn.classList.add("hidden");
  stopBtn.classList.remove("hidden");
  outputEl.textContent = "";
  outputEl.classList.remove("prose");

  abortCtrl = new AbortController();

  let fullText = "";
  try {
    const resp = await fetch("{% url 'generate_stream' %}", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        description,
        language: langSel.value,
        context_code: contextInput.value.trim() || null,
        model: modelSel?.value || null,
      }),
      signal: abortCtrl.signal,
    });
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n"); buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const d = line.slice(6);
        if (d === "[DONE]") { reader.cancel(); break; }
        fullText += d;
        outputEl.textContent = fullText;
      }
    }
  } catch (e) {
    if (e.name !== "AbortError") outputEl.textContent = `Error: ${e.message}`;
  }

  if (fullText) {
    outputEl.innerHTML = markdownToHtml(fullText);
    outputEl.classList.add("prose");
  }

  genBtn.classList.remove("hidden");
  stopBtn.classList.add("hidden");
  abortCtrl = null;
});

stopBtn.addEventListener("click", () => {
  abortCtrl?.abort();
  genBtn.classList.remove("hidden");
  stopBtn.classList.add("hidden");
});
</script>
{% endblock %}
