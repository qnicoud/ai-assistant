{% extends "base.html" %}
{% block title %}Chat — AI Assistant{% endblock %}
{% block content %}
<div class="page-title">Chat</div>

<!-- Toolbar -->
<div class="toolbar">
  <select id="model-select">
    {% for m in models %}<option value="{{ m }}">{{ m }}</option>{% endfor %}
    {% if not models %}<option value="">No models found</option>{% endif %}
  </select>

  {% if rag_available %}
  <label class="inline-toggle" title="Use ingested documents as context">
    <input type="checkbox" id="rag-toggle">
    <span class="switch"></span>
    Docs mode
  </label>
  {% endif %}

  <button class="btn btn-ghost btn-sm" id="clear-btn">🗑 Clear</button>
</div>

<!-- Chat layout -->
<div class="glass-card chat-layout">
  <div class="chat-messages" id="messages"></div>

  <div class="chat-input-row">
    <textarea id="chat-input" placeholder="Ask anything… (Enter to send, Shift+Enter for newline)"
              data-autoresize rows="1"></textarea>
    <button class="btn btn-primary" id="send-btn">Send</button>
  </div>
</div>

<script>
const messagesEl = document.getElementById("messages");
const inputEl    = document.getElementById("chat-input");
const sendBtn    = document.getElementById("send-btn");
const clearBtn   = document.getElementById("clear-btn");
const modelSel   = document.getElementById("model-select");
const ragToggle  = document.getElementById("rag-toggle");

let history = [];   // [{role, content}, ...]
let abortCtrl = null;

function addMessage(role, text) {
  const div = document.createElement("div");
  div.className = `message ${role}`;
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  inputEl.value = "";
  autoResize(inputEl);
  sendBtn.disabled = true;

  addMessage("user", text);

  const aiDiv = addMessage("assistant", "…");
  messagesEl.scrollTop = messagesEl.scrollHeight;

  abortCtrl = new AbortController();

  const payload = {
    message: text,
    model: modelSel?.value || null,
    rag_enabled: ragToggle?.checked || false,
    history: history,
  };

  let fullText = "";
  try {
    const resp = await fetch("{% url 'chat_stream' %}", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
      signal: abortCtrl.signal,
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const raw = line.slice(6);
        if (raw === "[DONE]") { reader.cancel(); break; }
        try {
          const token = JSON.parse(raw);
          if (typeof token === "string" && token.startsWith("[ERROR]")) {
            aiDiv.textContent = token;
            break;
          }
          fullText += token;
        } catch { fullText += raw; }
        aiDiv.textContent = fullText;
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
    }
  } catch (e) {
    if (e.name !== "AbortError") aiDiv.textContent = `Error: ${e.message}`;
  }

  // Update history
  history.push({ role: "user", content: text });
  history.push({ role: "assistant", content: fullText });

  sendBtn.disabled = false;
  abortCtrl = null;
}

sendBtn.addEventListener("click", sendMessage);

inputEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

clearBtn.addEventListener("click", () => {
  history = [];
  messagesEl.innerHTML = "";
});
</script>
{% endblock %}
